# /etc/nginx/sites-available/workspace-app
#
# Маршрутизация:
#   /static/        → файлы из /var/www/workspace-app/staticfiles/
#   /media/         → файлы из /var/www/workspace-app/media/
#   /ws/*           → daphne (ASGI, WebSocket) через unix-сокет
#   всё остальное   → gunicorn (WSGI, HTTP) через unix-сокет
#
# После заливки:
#   ln -sf /etc/nginx/sites-available/workspace-app /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx

upstream gunicorn_app {
    server unix:/run/gunicorn.sock fail_timeout=0;
}

upstream daphne_app {
    server unix:/run/daphne.sock fail_timeout=0;
}

server {
    listen 80;
    server_name 72.56.234.89 _;

    client_max_body_size 50m;

    # Логи
    access_log /var/log/nginx/workspace-app.access.log;
    error_log  /var/log/nginx/workspace-app.error.log;

    # ── Static & media ──────────────────────────────────────
    location /static/ {
        alias /var/www/workspace-app/staticfiles/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location /media/ {
        alias /var/www/workspace-app/media/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # ── WebSocket → daphne ──────────────────────────────────
    location /ws/ {
        proxy_pass http://daphne_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket — длинные коннекты, без таймаутов
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── HTTP → gunicorn ─────────────────────────────────────
    location / {
        proxy_pass http://gunicorn_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_read_timeout 60s;
    }
}
