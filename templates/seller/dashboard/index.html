  {% verbatim %}<script type="text/babel" data-presets="react">

    /* ── PURE SVG CHARTS ── */
    function SvgArea({ data, color, height = 76 }) {
      const w = 600, h = height;
      const min = Math.min(...data.map(d => d.v));
      const max = Math.max(...data.map(d => d.v));
      const range = max - min || 1;
      const pts = data.map((d, i) => ({
        x: (i / (data.length - 1)) * w,
        y: h - ((d.v - min) / range) * (h * 0.85) - h * 0.05,
      }));
      const line = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${p.x},${p.y}`).join(' ');
      const area = `${line} L${w},${h} L0,${h} Z`;
      const id = `ag${Math.random().toString(36).slice(2)}`;
      return (
        <svg viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" width="100%" height={h} style={{ display: 'block' }}>
          <defs>
            <linearGradient id={id} x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={color} stopOpacity="0.15"/>
              <stop offset="100%" stopColor={color} stopOpacity="0"/>
            </linearGradient>
          </defs>
          <path d={area} fill={`url(#${id})`}/>
          <path d={line} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      );
    }

    function SvgAreaMonth({ data, dataKey, color, yMin, yMax }) {
      const W = 400, H = 180, PAD = { t: 10, r: 8, b: 28, l: 28 };
      const cw = W - PAD.l - PAD.r, ch = H - PAD.t - PAD.b;
      const lo = yMin ?? Math.min(...data.map(d => d[dataKey]));
      const hi = yMax ?? Math.max(...data.map(d => d[dataKey]));
      const range = hi - lo || 1;
      const xs = data.map((_, i) => PAD.l + (i / (data.length - 1)) * cw);
      const ys = data.map(d => PAD.t + ch - ((d[dataKey] - lo) / range) * ch);
      const line = xs.map((x, i) => `${i === 0 ? 'M' : 'L'}${x},${ys[i]}`).join(' ');
      const area = `${line} L${xs[xs.length-1]},${PAD.t+ch} L${xs[0]},${PAD.t+ch} Z`;
      const id = `sa${Math.random().toString(36).slice(2)}`;
      const ticks = [lo, Math.round((lo+hi)/2), hi];
      return (
        <svg viewBox={`0 0 ${W} ${H}`} width="100%" height={H} style={{ display: 'block', overflow: 'visible' }}>
          <defs>
            <linearGradient id={id} x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={color} stopOpacity="0.15"/>
              <stop offset="100%" stopColor={color} stopOpacity="0"/>
            </linearGradient>
          </defs>
          {ticks.map((t, i) => {
            const y = PAD.t + ch - ((t - lo) / range) * ch;
            return <line key={i} x1={PAD.l} x2={PAD.l + cw} y1={y} y2={y} stroke="rgba(255,255,255,0.035)" strokeWidth="1"/>;
          })}
          {ticks.map((t, i) => {
            const y = PAD.t + ch - ((t - lo) / range) * ch;
            return <text key={i} x={PAD.l - 4} y={y + 4} textAnchor="end" fontSize="9" fill="#484848">{t}</text>;
          })}
          {data.map((d, i) => (
            <text key={i} x={xs[i]} y={H - 6} textAnchor="middle" fontSize="9" fill="#6A6A6A">{d.m}</text>
          ))}
          <path d={area} fill={`url(#${id})`}/>
          <path d={line} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
          {xs.map((x, i) => (
            <circle key={i} cx={x} cy={ys[i]} r="2.5" fill="#242424" stroke={color} strokeWidth="1.5"/>
          ))}
        </svg>
      );
    }

    function SvgBar({ data, keyA, keyB, colorA, colorB }) {
      const W = 400, H = 180, PAD = { t: 10, r: 8, b: 28, l: 28 };
      const cw = W - PAD.l - PAD.r, ch = H - PAD.t - PAD.b;
      const maxV = Math.max(...data.map(d => Math.max(d[keyA], d[keyB])));
      const bw = 12, gap = 4;
      const slotW = cw / data.length;
      return (
        <svg viewBox={`0 0 ${W} ${H}`} width="100%" height={H} style={{ display: 'block', overflow: 'visible' }}>
          {[0, Math.round(maxV/2), maxV].map((t, i) => {
            const y = PAD.t + ch - (t / maxV) * ch;
            return <g key={i}>
              <line x1={PAD.l} x2={PAD.l+cw} y1={y} y2={y} stroke="rgba(255,255,255,0.035)" strokeWidth="1"/>
              <text x={PAD.l-4} y={y+4} textAnchor="end" fontSize="9" fill="#484848">{t}</text>
            </g>;
          })}
          {data.map((d, i) => {
            const cx = PAD.l + i * slotW + slotW / 2;
            const hA = (d[keyA] / maxV) * ch;
            const hB = (d[keyB] / maxV) * ch;
            return <g key={i}>
              <rect x={cx - gap/2 - bw} y={PAD.t + ch - hB} width={bw} height={hB} fill="rgba(58,58,58,0.4)" rx="2"/>
              <rect x={cx + gap/2} y={PAD.t + ch - hA} width={bw} height={hA} fill={i >= data.length - 2 ? colorA : `rgba(100,181,246,${0.3+i*0.08})`} rx="2"/>
              <text x={cx} y={H-6} textAnchor="middle" fontSize="9" fill="#6A6A6A">{d.m}</text>
            </g>;
          })}
        </svg>
      );
    }

      const c = CURRENCIES[cur];

      if (val >= 1e3) return `${c.symbol}${(val / 1e3).toFixed(0)}K`;
      return `${c.symbol}${val.toFixed(0)}`;

                                  display: "flex", alignItems: "center", gap: 8, transition: "background .12s",
                                }} onMouseEnter={e => e.currentTarget.style.background = P.hov} onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                                  <svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke={sky} strokeWidth="1.5" strokeLinecap="round"><path d="M6 2v8M2 6h8"/></svg>
                                  {BLOCK_NAMES[id]}
                                </div>
                              ))}
                            </div>
                          )}
                        </div>
                      )}
                      <div style={{ display: "flex", gap: 1, background: P.card, borderRadius: 7, padding: 2, border: `1px solid ${P.brd}` }}>
                        {["1М","3М","6М","1Г","Всё"].map(p=>(
                          <button key={p} onClick={()=>setPeriod(p)} style={{
                            padding: "4px 10px", borderRadius: 5, border: "none",
                            background: period===p ? P.el : "transparent",
                            color: period===p ? P.t0 : P.t1,
                            fontSize: 11, fontWeight: 500, cursor: "pointer", fontFamily: "Geist, Inter, sans-serif",
                          }}>{p}</button>
                        ))}
                      </div>
                    </div>
                  </div>
                </div>

                {blocks.map(blockId => {
                  const wrap = (ch, st = {}) => (
                    <div key={blockId} className={`blk${dragBlock === blockId ? " dragging" : ""}`}
                      draggable onDragStart={e => onBlockDragStart(e, blockId)}
                      onDragOver={e => onBlockDragOver(e, blockId)} onDragEnd={() => setDragBlock(null)}
                      style={{ position: "relative", cursor: "grab", marginBottom: 12, ...st }}>
                      <div className="blk-ctrl">
                        <div onClick={() => hideBlock(blockId)} style={{ cursor: "pointer", padding: "2px 5px", borderRadius: 4, background: P.el, color: P.t2, fontSize: 10, lineHeight: 1 }}>✕</div>
                      </div>
                      {ch}
                    </div>
                  );

                  if (blockId === "hero") return wrap(
                    <div style={{ height: 120 }}>
                      <SvgArea data={heroLine} color={sky} height={120} />
                    </div>, { marginBottom: 20 }
                  );

                  if (blockId === "metrics") {
                    const allM = [
                      { id: "m_orders", l: "Активные заказы", v: "45", t: "+12%", up: true, ctx: "за 30 дней" },
                      { id: "m_sla", l: "Исполнение SLA", v: "95.2%", t: "+2.1%", up: true, ctx: "норматив: 90%" },
                      { id: "m_conv", l: "Конверсия запросов", v: "68%", t: "-3%", up: false, ctx: "запрос → заказ" },
                      { id: "m_rating", l: "Рейтинг поставщика", v: "4.26", t: "+0.02", up: true, ctx: "из 5.0" },
                    ];
                    const vis = metricOrder.filter(id => !hiddenMetrics.includes(id));
                    return wrap(<div style={{ display: "grid", gridTemplateColumns: `repeat(${Math.max(vis.length,1)}, 1fr)`, gap: 12 }}>
                      {vis.map(mid => { const s = allM.find(x => x.id === mid); if (!s) return null; return (
                        <div key={mid} draggable onDragStart={e => { e.stopPropagation(); setDragMetric(mid); e.dataTransfer.effectAllowed="move"; }}
                          onDragOver={e => { e.preventDefault(); e.stopPropagation(); if(!dragMetric||dragMetric===mid) return; setMetricOrder(p=>{const a=[...p],fi=a.indexOf(dragMetric),ti=a.indexOf(mid);if(fi===-1||ti===-1)return p;a.splice(fi,1);a.splice(ti,0,dragMetric);return a;}); }}
                          onDragEnd={()=>setDragMetric(null)}
                          style={{ background: P.card, borderRadius: 14, border: `1px solid ${P.brd}`, padding: "14px 18px", display: "flex", flexDirection: "column", minHeight: 82, position: "relative", cursor: "grab", opacity: dragMetric===mid?0.35:1 }}>
                          <div className="mc" style={{ position: "absolute", top: 6, right: 6, opacity: 0, transition: "opacity .15s" }}>
                            <div onClick={e=>{e.stopPropagation();setHiddenMetrics(p=>[...p,mid]);}} style={{ cursor:"pointer",padding:"2px 5px",borderRadius:4,background:P.el,color:P.t2,fontSize:10,lineHeight:1 }}>✕</div>
                          </div>
                          <div style={{ fontSize: 11, color: P.t1, marginBottom: 8, height: 14, whiteSpace: "nowrap" }}>{s.l}</div>
                          <div style={{ display: "flex", alignItems: "baseline", gap: 8, flex: 1 }}>
                            <span style={{ fontSize: 20, fontWeight: 700, color: P.t0, fontFamily: "'Golos Text', sans-serif", letterSpacing: "-0.02em" }}>{s.v}</span>
                            <span style={{ fontSize: 11, fontWeight: 600, color: s.up?sky:ora, background: s.up?`${skyDim}0.08)`:`${oraDim}0.08)`, padding: "2px 6px", borderRadius: 4 }}>{s.t}</span>
                          </div>
                          <div style={{ fontSize: 11, color: P.t1, marginTop: "auto" }}>{s.ctx}</div>
                        </div>); })}
                      {hiddenMetrics.length > 0 && <div onClick={()=>{setHiddenMetrics([]);setMetricOrder(["m_orders","m_sla","m_conv","m_rating"]);}} style={{ background: P.el, borderRadius: 14, border: `1px dashed ${P.brd}`, padding: 18, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", minHeight: 100 }}><span style={{ fontSize: 12, color: P.t1 }}>+ {hiddenMetrics.length} скрыто</span></div>}
                    </div>, { marginBottom: 20 });
                  }

                  if (blockId === "charts") {
                    const chartCards = {
                      revenue: <div style={{ background: P.card, padding: "20px 22px 18px", borderRadius: 14, border: `1px solid ${P.brd}` }}>
                        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
                          <div style={{ fontSize: 14, fontWeight: 600, color: P.t0 }}>Выручка по месяцам</div>
                          <div style={{ display: "flex", gap: 14 }}>{[{l:"2026",c:sky},{l:"2025",c:P.t3}].map((x,i)=>(<div key={i} style={{ display:"flex",alignItems:"center",gap:5,fontSize:12,color:P.t1 }}><div style={{ width:8,height:3,borderRadius:1,background:x.c }}/>{x.l}</div>))}</div>
                        </div>
                        <SvgBar data={revenue} keyA="val" keyB="p" colorA={sky} colorB={P.t3} />
                      </div>,
                      sla: <div style={{ background: P.card, padding: "20px 22px 18px", borderRadius: 14, border: `1px solid ${P.brd}` }}>
                        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
                          <div style={{ fontSize: 14, fontWeight: 600, color: P.t0 }}>Исполнение SLA</div>
                          <span style={{ fontSize: 14, fontWeight: 700, color: sky, fontFamily: "'Golos Text', sans-serif" }}>95.2%</span>
                        </div>
                        <SvgAreaMonth data={sla} dataKey="v" color={sky} yMin={85} yMax={100} />
                      </div>,
                    };
                    return wrap(<div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                      {chartsOrder.map(cid => <div key={cid} draggable onDragStart={e=>onInnerDragStart(e,cid)} onDragOver={e=>makeInnerDragOver(setChartsOrder)(e,cid)} onDragEnd={()=>setDragInner(null)} style={{ cursor:"grab", opacity:dragInner===cid?0.35:1, transition:"opacity .2s" }}>{chartCards[cid]}</div>)}
                    </div>);
                  }

                  if (blockId === "status") {
                    const statusCards = {
                      rating: <div style={{ background: P.card, padding: "24px 20px", borderRadius: 14, border: `1px solid ${P.brd}`, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "100%" }}>
                        <div style={{ position: "relative", width: 80, height: 80, marginBottom: 10 }}>
                          <svg width="80" height="80" viewBox="0 0 80 80" style={{ transform: "rotate(-90deg)" }}><circle cx="40" cy="40" r="34" fill="none" stroke={P.el} strokeWidth="3.5"/><circle cx="40" cy="40" r="34" fill="none" stroke={sky} strokeWidth="3.5" strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={m?off:circ} style={{ transition: "stroke-dashoffset 1.6s cubic-bezier(.22,1,.36,1)" }}/></svg>
                          <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}><span style={{ fontSize: 20, fontWeight: 800, color: P.t0, fontFamily: "'Golos Text', sans-serif" }}>{score}</span><span style={{ fontSize: 11, color: P.t2 }}>из 5</span></div>
                        </div>
                        <div style={{ fontSize: 12, fontWeight: 500, color: P.t1, marginBottom: 4 }}>Рейтинг поставщика</div>
                        <div style={{ fontSize: 11, color: P.t1, marginBottom: 8 }}>Внешняя 60% + поведение 40%</div>
                        <div style={{ display: "flex", gap: 12, marginBottom: 8 }}>{[{l:"Внешняя 60%",v:"4.3"},{l:"Поведение 40%",v:"4.2"}].map((r,i)=>(<div key={i} style={{ textAlign:"center" }}><div style={{ fontSize:11,color:P.t1 }}>{r.l}</div><div style={{ fontSize:15,fontWeight:700,color:P.t0,fontFamily:"'Golos Text', sans-serif" }}>{r.v}</div></div>))}</div>
                        <div style={{ fontSize: 11, fontWeight: 600, color: P.t0, background: `${skyDim}0.08)`, display: "inline-block", padding: "2px 8px", borderRadius: 4 }}>Надёжный</div>
                      </div>,
                      orders: <div style={{ background: P.card, padding: "24px 26px", borderRadius: 14, border: `1px solid ${P.brd}`, height: "100%" }}>
                        <div style={{ marginBottom: 16 }}><div style={{ fontSize: 11, color: P.t1, fontWeight: 500, marginBottom: 6 }}>Заказы по статусам</div><div style={{ display: "flex", alignItems: "baseline", gap: 8 }}><span style={{ fontSize: 18, fontWeight: 700, color: P.t0, fontFamily: "'Golos Text', sans-serif" }}>9</span><span style={{ fontSize: 11, color: P.t1 }}>активных</span></div></div>
                        <div style={{ display: "flex", height: 6, borderRadius: 3, overflow: "hidden", marginBottom: 16, gap: 2 }}><div style={{ flex:1,background:sky,borderRadius:2 }}/><div style={{ flex:1,background:`${skyDim}0.5)`,borderRadius:2 }}/><div style={{ flex:1,background:ora,borderRadius:2,opacity:0.7 }}/></div>
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "6px 20px" }}>{statuses.map((s,i)=>{const colors=[sky,P.t2,P.t2,`${skyDim}0.5)`,ora];return(<div key={i} style={{ display:"flex",alignItems:"center",gap:6,padding:"3px 0" }}><div style={{ width:5,height:5,borderRadius:1.5,background:colors[i],flexShrink:0 }}/><span style={{ fontSize:11,color:s.count>0?P.t0:P.t2,flex:1 }}>{s.name}</span><span style={{ fontSize:12,fontWeight:600,color:s.count>0?P.t0:P.t2,fontFamily:"'Golos Text', sans-serif",fontVariantNumeric:"tabular-nums" }}>{s.count}</span></div>);})}</div>
                      </div>,
                    };
                    const cols = statusOrder[0] === "rating" ? "260px 1fr" : "1fr 260px";
                    return wrap(<div style={{ display: "grid", gridTemplateColumns: cols, gap: 12 }}>
                      {statusOrder.map(sid => <div key={sid} draggable onDragStart={e=>onInnerDragStart(e,sid)} onDragOver={e=>makeInnerDragOver(setStatusOrder)(e,sid)} onDragEnd={()=>setDragInner(null)} style={{ cursor:"grab", opacity:dragInner===sid?0.35:1, transition:"opacity .2s" }}>{statusCards[sid]}</div>)}
                    </div>);
                  }

                  if (blockId === "work") {
                    const workCards = {
                      requests: <div style={{ background: P.card, borderRadius: 14, border: `1px solid ${P.brd}`, overflow: "hidden", height: "100%" }}>
                        <div style={{ padding: "18px 22px", borderBottom: `1px solid ${P.sep}`, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                          <div><div style={{ display:"flex",alignItems:"center",gap:8 }}><span style={{ fontSize:14,fontWeight:700,color:P.t0 }}>Входящие запросы</span><span style={{ fontSize:11,fontWeight:600,color:ora,background:`${oraDim}0.08)`,padding:"2px 7px",borderRadius:4 }}>4 новых</span></div><div style={{ fontSize:11,color:P.t1,marginTop:3 }}>Запросы клиентов на расценку</div></div>
                          <span style={{ fontSize:11,color:P.t2,cursor:"pointer" }}>Все →</span>
                        </div>
                        <div style={{ display:"grid",gridTemplateColumns:"76px 1.5fr 1fr 80px",gap:10,padding:"10px 22px",borderBottom:`1px solid ${P.sep}` }}>{["ID","Деталь","Клиент","Сумма"].map((h,i)=>(<span key={i} style={{ fontSize:11,color:P.t1,fontWeight:600,letterSpacing:"0.06em",textAlign:i===3?"right":"left" }}>{h}</span>))}</div>
                        {requests.map((req,i)=>(<div key={i} className="rw" style={{ display:"grid",gridTemplateColumns:"76px 1.5fr 1fr 80px",gap:12,padding:"16px 24px",alignItems:"center",borderBottom:i<requests.length-1?`1px solid ${P.sep}`:"none" }}>
                          <div style={{ display:"flex",alignItems:"center",gap:5 }}><div style={{ width:4,height:4,borderRadius:1,background:tyC[req.type],flexShrink:0 }}/><span style={{ fontSize:12,fontWeight:500,color:P.t1,fontVariantNumeric:"tabular-nums" }}>{req.id}</span></div>
                          <div style={{ minWidth:0 }}><div style={{ fontSize:13,fontWeight:500,color:P.t0,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis" }}>{req.part}</div><div style={{ fontSize:11,color:P.t1,marginTop:2 }}>{req.brand} · {req.time}</div></div>
                          <span style={{ fontSize:12,color:P.t1 }}>{req.client}</span>
                          <span style={{ fontSize:13,fontWeight:600,color:P.t0,textAlign:"right",fontFamily:"'Golos Text', sans-serif",fontVariantNumeric:"tabular-nums" }}>{fmtCur(req.usd,cur)}</span>
                        </div>))}
                      </div>,
                      events: <div style={{ background: P.card, borderRadius: 14, border: `1px solid ${P.brd}`, overflow: "hidden", height: "100%" }}>
                        <div style={{ padding: "18px 18px", borderBottom: `1px solid ${P.sep}`, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                          <div><span style={{ fontSize:14,fontWeight:700,color:P.t0 }}>Лента событий</span><div style={{ fontSize:11,color:P.t1,marginTop:3 }}>Заказы, SLA, платежи</div></div>
                          <span style={{ fontSize:11,color:P.t2,cursor:"pointer" }}>Все →</span>
                        </div>
                        {eventsBase.map((ev,i)=>(<div key={i} className="rw" style={{ padding:"15px 20px",borderBottom:i<eventsBase.length-1?`1px solid ${P.sep}`:"none",display:"flex",gap:10,alignItems:"flex-start" }}>
                          <div style={{ width:5,height:5,borderRadius:"50%",background:ev.dot,marginTop:6,flexShrink:0 }}/>
                          <div style={{ flex:1,minWidth:0 }}>
                            <div style={{ display:"flex",alignItems:"baseline",justifyContent:"space-between",gap:8 }}><span style={{ fontSize:12,fontWeight:500,color:P.t0,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis" }}>{typeof ev.text==="function"?ev.text(cur):ev.text}</span><span style={{ fontSize:11,color:P.t1,flexShrink:0,fontVariantNumeric:"tabular-nums" }}>{ev.time}</span></div>
                            <div style={{ fontSize:11,color:P.t1,marginTop:3 }}>{typeof ev.detail==="function"?ev.detail(cur):ev.detail}</div>
                          </div>
                        </div>))}
                      </div>,
                    };
                    const wCols = workOrder[0] === "requests" ? "1.5fr 1fr" : "1fr 1.5fr";
                    return wrap(<div style={{ display: "grid", gridTemplateColumns: wCols, gap: 12 }}>
                      {workOrder.map(wid => <div key={wid} draggable onDragStart={e=>onInnerDragStart(e,wid)} onDragOver={e=>makeInnerDragOver(setWorkOrder)(e,wid)} onDragEnd={()=>setDragInner(null)} style={{ cursor:"grab", opacity:dragInner===wid?0.35:1, transition:"opacity .2s" }}>{workCards[wid]}</div>)}
                    </div>);
                  }

                  return null;
                })}

              </div>
            </main>

            {/* ═══ RIGHT PANEL — PINNABLE WIDGETS ═══ */}
            <div style={{
              width: 280, background: P.side, borderLeft: `1px solid ${P.brd}`,
              display: "flex", flexDirection: "column", flexShrink: 0,
              height: "100vh",
            }}>
              {/* Panel header */}
              <div style={{ padding: "14px 16px 10px", borderBottom: `1px solid ${P.brd}`, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <span style={{ fontSize: 11, color: P.t1, fontWeight: 500, letterSpacing: "0.06em", textTransform: "uppercase" }}>Панель</span>
                <div style={{ position: "relative" }}>
                  <button onClick={() => setShowPicker(!showPicker)} style={{
                    background: showPicker ? P.el : "transparent",
                    border: showPicker ? `1px solid ${P.brd}` : "1px solid transparent",
                    borderRadius: 5, padding: "3px 8px", cursor: "pointer", fontSize: 11, color: P.t0,
                    fontFamily: "Geist, Inter, sans-serif", display: "flex", alignItems: "center", gap: 4, transition: "all .15s",
                  }}>
                    <svg width="9" height="9" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><path d="M6 2v8M2 6h8"/></svg>
                    Виджеты
                  </button>

                  {/* Picker dropdown */}
                  {showPicker && (
                    <div style={{
                      position: "absolute", top: "100%", right: 0, marginTop: 4, width: 220,
                      background: P.card, border: `1px solid ${P.brd}`, borderRadius: 10,
                      padding: 6, boxShadow: "0 12px 40px rgba(0,0,0,0.6)", zIndex: 50,
                    }}>
                      <div style={{ fontSize: 11, color: P.t1, padding: "4px 10px 6px", letterSpacing: "0.05em", textTransform: "uppercase" }}>Закрепить виджеты</div>
                      {WIDGET_IDS.map(id => {
                        const w = WIDGETS[id];
                        const on = pinned.includes(id);
                        return (
                          <div key={id} className="wp-row" onClick={() => togglePin(id)}>
                            <div style={{
                              width: 13, height: 13, borderRadius: 3,
                              border: `1.5px solid ${on ? sky : P.t2}`,
                              background: on ? `${skyDim}0.12)` : "transparent",
                              display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0,
                            }}>
                              {on && <svg width="7" height="7" viewBox="0 0 10 10" fill="none" stroke={sky} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 5l2.5 2.5L8 3"/></svg>}
                            </div>
                            <div style={{ flex: 1 }}>
                              <div style={{ color: on ? P.t0 : P.t1, fontWeight: on ? 500 : 400 }}>{w.title}</div>
                              <div style={{ fontSize: 11, color: P.t1 }}>{w.desc}</div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              </div>

              {/* Widgets */}
              <div style={{ flex: 1, overflow: "auto", padding: "8px 8px 20px" }}>
                {pinned.length === 0 && (
                  <div style={{ textAlign: "center", padding: "40px 12px", color: P.t1, fontSize: 12 }}>
                    Нажмите «Виджеты» чтобы<br/>закрепить нужные блоки
                  </div>
                )}
                <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                  {pinned.map((id, idx) => {
                    const w = WIDGETS[id];
                    if (!w) return null;
                    return (
                      <div
                        key={id}
                        className={`wi-card fi ${dragId === id ? "dragging" : ""}`}
                        style={{ animationDelay: `${0.04 + idx * 0.03}s` }}
                        draggable
                        onDragStart={e => onDragStart(e, id)}
                        onDragOver={e => onDragOver(e, id)}
                        onDragEnd={() => setDragId(null)}
                      >
                        {/* Widget header */}
                        <div style={{
                          display: "flex", alignItems: "center", justifyContent: "space-between",
                          padding: "8px 12px 6px",
                        }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                            <span style={{ cursor: "grab", fontSize: 11, color: P.t2, lineHeight: 1 }}>⠿</span>
                            <span style={{ fontSize: 12, fontWeight: 600, color: P.t0 }}>{w.title}</span>
                          </div>
                          <button onClick={() => togglePin(id)} style={{
                            background: "none", border: "none", cursor: "pointer", padding: 2,
                            color: P.t1, fontSize: 11, opacity: 0.8, lineHeight: 1,
                          }} title="Открепить">
                            <svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><path d="M2 2l8 8M2 10l8-8"/></svg>
                          </button>
                        </div>
                        {/* Widget body */}
                        <div style={{ padding: "0 12px 10px" }}>
                          {w.render({ dismiss: dismissed, setDismiss: setDismissed, cur })}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard />);
  </script>{% endverbatim %}
</body>
</html>
