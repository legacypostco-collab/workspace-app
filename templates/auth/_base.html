{% load static i18n %}
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Auth{% endblock %} | Consolidator Parts</title>
  <link rel="icon" type="image/svg+xml" href="{% static 'marketplace/consolidator-logo.svg' %}"/>
  <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{min-height:100vh;background:#1A1A1A;color:#ECECEC;font-family:'Inter',sans-serif;font-size:14px;}
    a{color:#64B5F6;text-decoration:none;}
    a:hover{text-decoration:underline;}
    .auth-page{min-height:100vh;display:flex;flex-direction:column;}
    .auth-header{padding:18px 32px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:18px;}
    .auth-logo{display:flex;align-items:center;gap:10px;font-family:'Golos Text',sans-serif;font-weight:800;font-size:16px;color:#ECECEC;text-decoration:none;}
    .auth-logo svg{width:26px;height:26px;}
    .auth-back{margin-left:auto;font-size:12px;color:#919191;text-decoration:none;padding:6px 14px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);}
    .auth-back:hover{color:#ECECEC;border-color:rgba(100,181,246,0.35);text-decoration:none;}
    .auth-main{flex:1;display:flex;align-items:center;justify-content:center;padding:32px 24px;}
    .auth-card{background:#242424;border:1px solid rgba(255,255,255,0.04);border-radius:16px;padding:36px;max-width:440px;width:100%;}
    .auth-title{font-family:'Golos Text',sans-serif;font-weight:800;font-size:24px;color:#ECECEC;margin-bottom:6px;}
    .auth-subtitle{color:#919191;font-size:13px;margin-bottom:24px;line-height:1.5;}
    .auth-form p{margin-bottom:14px;}
    .auth-form label{display:block;font-size:12px;font-weight:600;color:#919191;margin-bottom:6px;letter-spacing:0.04em;text-transform:uppercase;}
    .auth-form input{width:100%;padding:10px 14px;background:#1A1A1A;border:1px solid rgba(255,255,255,0.08);border-radius:10px;color:#ECECEC;font-size:13px;font-family:inherit;outline:none;}
    .auth-form input:focus{border-color:rgba(100,181,246,0.5);}
    .auth-form .helptext{font-size:11px;color:#5E5E5E;margin-top:4px;display:block;}
    .auth-form .errorlist{list-style:none;padding:0;margin:6px 0;color:#E85C0D;font-size:12px;}
    .auth-btn{display:block;width:100%;padding:12px;background:#64B5F6;color:#1A1A1A;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px;font-family:inherit;}
    .auth-btn:hover{background:#7BC5FA;}
    .auth-bottom{text-align:center;font-size:13px;color:#919191;margin-top:18px;}
    .auth-message{padding:14px;background:rgba(100,181,246,0.08);border:1px solid rgba(100,181,246,0.2);border-radius:10px;color:#ECECEC;font-size:13px;line-height:1.5;margin-bottom:18px;}
    .auth-message-success{background:rgba(102,187,106,0.08);border-color:rgba(102,187,106,0.25);}
  </style>
</head>
<body>
<div class="auth-page">
  <header class="auth-header">
    <a href="/" class="auth-logo">
      <svg viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="14" stroke="#64B5F6" stroke-width="2"/><circle cx="16" cy="16" r="6" fill="#64B5F6"/></svg>
      Consolidator
    </a>
    <a href="/login/" class="auth-back">{% trans "Войти" %}</a>
  </header>
  <main class="auth-main">
    <div class="auth-card">
      {% block content %}{% endblock %}
    </div>
  </main>
</div>
{% include "components/_cookie_banner.html" %}
</body>
</html>
