{% extends "seller/base_seller.html" %}
{% block title %}{% if mode == 'create' %}Новый товар{% else %}Редактирование товара{% endif %}{% endblock %}
{% block content %}
<div class="card card-form">
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="card-actions">
      <button class="btn" type="submit">Сохранить</button>
      <a class="btn btn-secondary" href="{% if part %}{% url 'seller_product_detail' part.id %}{% else %}{% url 'seller_product_list' %}{% endif %}">Отмена</a>
    </div>
  </form>
</div>
{% endblock %}
