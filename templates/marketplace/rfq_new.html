{% extends "marketplace/base_app.html" %}
{% block title %}Новый RFQ | Consolidator Parts{% endblock %}
{% block content %}
<nav class="cp-breadcrumbs">
  <a href="{% url 'rfq_list' %}">RFQ</a> / <span>Новый</span>
</nav>

<div class="cp-section">
  <h1 class="cp-card__title">Новый RFQ</h1>
  <p class="cp-card__subtitle">Отправьте список позиций, система сразу подберет совпадения по каталогу.</p>
</div>

<div class="cp-card">
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <div style="display:flex;gap:8px;margin-top:16px;">
      <button class="cp-btn cp-btn--primary" type="submit">Создать RFQ</button>
      <a class="cp-btn cp-btn--secondary" href="{% url 'rfq_list' %}">К списку RFQ</a>
    </div>
  </form>
</div>
{% endblock %}
