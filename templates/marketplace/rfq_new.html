{% extends "marketplace/base.html" %}
{% block title %}Новый RFQ | Consolidator Parts{% endblock %}
{% block content %}
<section class="section-head">
  <h1>Новый RFQ</h1>
  <p class="muted">Отправьте список позиций, система сразу подберет совпадения по каталогу.</p>
</section>

<section class="panel card-form">
  <form method="post" class="list">
    {% csrf_token %}
    {{ form.as_p }}
    <div>
      <button class="btn" type="submit">Создать RFQ</button>
      <a class="btn btn-secondary" href="{% url 'rfq_list' %}">К списку RFQ</a>
    </div>
  </form>
</section>
{% endblock %}
