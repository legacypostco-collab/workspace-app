{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход | Consolidator Parts</title>
  <link rel="icon" type="image/svg+xml" href="{% static 'marketplace/consolidator-logo.svg' %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;800;900&family=Golos+Text:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
:root {
  --ink:#ECECEC;--muted:#919191;--accent:#64B5F6;--accent-hover:#5BA5E0;
  --bg:#1A1A1A;--card:#242424;--card-2:#2C2C2C;
  --border:rgba(255,255,255,0.07);--radius:20px;
  --shadow:0 12px 40px rgba(0,0,0,0.4);
  --ok:#28C840;--err:#E85C0D;--warn:#FFA000;
}
*{box-sizing:border-box;}
html{min-height:100%;background:var(--bg);}
body{min-height:100vh;margin:0;color:var(--ink);font-family:'Figtree','Manrope',sans-serif;line-height:1.55;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:40px 20px;}
.login-card{width:100%;max-width:420px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:36px 32px;box-shadow:var(--shadow);}
.login-card__logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:28px;text-decoration:none;}
.login-card__logo-name{font-family:'Golos Text','Inter',sans-serif;font-size:18px;font-weight:800;color:var(--ink);}
.login-card__logo-sub{font-size:10px;color:var(--muted);letter-spacing:0.06em;margin-top:2px;}
.login-card__title{font-size:22px;font-weight:700;margin:0 0 6px;font-family:'Golos Text','Inter',sans-serif;text-align:center;}
.login-card__subtitle{font-size:13px;color:var(--muted);margin:0 0 24px;text-align:center;}
.login-form label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:5px;}
.login-form input{width:100%;padding:10px 14px;font-size:14px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:var(--ink);outline:none;font-family:inherit;transition:border-color .15s;}
.login-form input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(100,181,246,0.12);}
.login-form p{margin-bottom:14px;}
.login-form .errorlist{list-style:none;padding:0;margin:4px 0 0;font-size:12px;color:var(--err);}
.login-submit{width:100%;padding:12px;font-size:15px;font-weight:600;background:var(--accent);color:#fff;border:none;border-radius:10px;cursor:pointer;margin-top:8px;font-family:inherit;transition:background .15s;}
.login-submit:hover{background:var(--accent-hover);}
.login-footer{text-align:center;margin-top:18px;font-size:13px;color:var(--muted);}
.login-footer a{color:var(--accent);text-decoration:none;font-weight:500;}
.login-footer a:hover{text-decoration:underline;}

/* Demo section */
.demo-section{margin-top:24px;padding-top:20px;border-top:1px solid var(--border);}
.demo-section__label{font-size:11px;font-weight:600;letter-spacing:0.08em;color:#5E5E5E;text-transform:uppercase;text-align:center;margin-bottom:12px;}
.demo-btns{display:flex;flex-direction:column;gap:8px;}
.demo-btn{display:flex;align-items:center;gap:10px;width:100%;padding:10px 14px;background:var(--card-2);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .15s;text-align:left;color:inherit;font-family:inherit;font-size:inherit;}
.demo-btn:hover{background:#343434;border-color:rgba(100,181,246,0.25);}
.demo-btn__icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.demo-btn__icon--seller{background:rgba(100,181,246,0.15);color:#64B5F6;}
.demo-btn__icon--buyer{background:rgba(40,200,64,0.12);color:#28C840;}
.demo-btn__icon--operator{background:rgba(255,160,0,0.12);color:#FFA000;}
.demo-btn__info{flex:1;min-width:0;}
.demo-btn__role{font-size:13px;font-weight:600;color:var(--ink);line-height:1.2;}
.demo-btn__login{font-size:11px;color:#5E5E5E;margin-top:1px;}
.demo-btn__arrow{color:#5E5E5E;font-size:14px;}

/* Light theme */
html.theme-light{--bg:#F5F7FA;--ink:#212647;--muted:#8892A4;--card:#FFFFFF;--card-2:#F0F4F9;--border:rgba(25,42,77,0.08);}
html.theme-light .login-card{box-shadow:0 12px 40px rgba(33,38,71,.10);}
html.theme-light .login-form input{background:#F0F4F9;border-color:rgba(25,42,77,0.12);color:#212647;}
html.theme-light .login-submit{background:#4568F3;}
html.theme-light .demo-btn{background:#F0F4F9;border-color:rgba(25,42,77,0.08);}
html.theme-light .demo-btn:hover{background:#E4EAF5;}
html.theme-light .demo-btn__role{color:#212647;}
  </style>
</head>
<body>

<div class="login-card">
  <a href="{% url 'home' %}" class="login-card__logo">
    <svg width="32" height="32" viewBox="0 0 74.1 74.1" fill="currentColor">
      <polygon points="5.38 46.64 2.24 54.63 17.29 69.68 17.3 69.69 21.44 66.22 24.75 42.14"/>
      <polygon points="21.44 66.22 24.87 74.1 46.16 74.1 46.64 68.72 31.95 49.35"/>
      <polygon points="46.64 68.72 54.63 71.86 69.69 56.8 66.22 52.66 42.14 49.35"/>
      <polygon points="68.71 27.45 71.86 19.47 56.8 4.41 52.65 7.87 49.35 31.95"/>
      <polygon points="74.1 27.94 68.71 27.45 49.35 42.14 66.22 52.66 74.1 49.23"/>
      <polygon points="52.65 7.87 49.23 0 27.93 0 27.45 5.38 42.14 24.75"/>
      <polygon points="27.45 5.38 19.47 2.24 4.41 17.3 7.87 21.44 31.95 24.75"/>
      <polygon points="7.87 21.44 0 24.87 0 46.16 5.38 46.64 24.75 31.95"/>
    </svg>
    <div>
      <div class="login-card__logo-name">Consolidator</div>
      <div class="login-card__logo-sub">PARTS</div>
    </div>
  </a>

  <h1 class="login-card__title">Войти в систему</h1>
  <p class="login-card__subtitle">Введите данные вашего аккаунта</p>

  <form method="post" class="login-form">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="login-submit">Войти</button>
  </form>

  <p class="login-footer">
    Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a>
  </p>

  <div class="demo-section">
    <div class="demo-section__label">Быстрый вход · Демо</div>
    <div class="demo-btns">
      <button type="button" class="demo-btn" onclick="demoLogin('demo_seller')">
        <div class="demo-btn__icon demo-btn__icon--seller">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        </div>
        <div class="demo-btn__info">
          <div class="demo-btn__role">Поставщик</div>
          <div class="demo-btn__login">demo_seller</div>
        </div>
        <span class="demo-btn__arrow">→</span>
      </button>
      <button type="button" class="demo-btn" onclick="demoLogin('demo_buyer')">
        <div class="demo-btn__icon demo-btn__icon--buyer">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        </div>
        <div class="demo-btn__info">
          <div class="demo-btn__role">Покупатель</div>
          <div class="demo-btn__login">demo_buyer</div>
        </div>
        <span class="demo-btn__arrow">→</span>
      </button>
      <button type="button" class="demo-btn" onclick="demoLogin('demo_operator')">
        <div class="demo-btn__icon demo-btn__icon--operator">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
        </div>
        <div class="demo-btn__info">
          <div class="demo-btn__role">Оператор</div>
          <div class="demo-btn__login">demo_operator</div>
        </div>
        <span class="demo-btn__arrow">→</span>
      </button>
    </div>
  </div>
</div>

<script>
function demoLogin(username) {
  var form = document.querySelector('.login-form');
  var userField = form.querySelector('input[name="username"]') || form.querySelector('input[type="text"]');
  var passField = form.querySelector('input[name="password"]') || form.querySelector('input[type="password"]');
  if (userField) userField.value = username;
  if (passField) passField.value = 'demo12345';
  form.submit();
}
(function(){
  var t = localStorage.getItem('cp_theme') || 'dark';
  if (t === 'light') document.documentElement.classList.add('theme-light');
})();
</script>
</body>
</html>
