{# Onboarding tour: shown ONCE on first cabinet visit. Skipped if localStorage flag set. #}
{% load i18n %}
<div id="onboarding-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:9998;backdrop-filter:blur(3px);"></div>
<div id="onboarding-popover" style="display:none;position:fixed;background:#242424;border:1px solid rgba(100,181,246,0.35);border-radius:14px;padding:22px;width:340px;box-shadow:0 12px 40px rgba(0,0,0,0.6);z-index:9999;font-family:'Inter',sans-serif;">
  <div id="ob-step-num" style="font-size:11px;color:#64B5F6;font-weight:700;letter-spacing:0.08em;margin-bottom:6px;"></div>
  <div id="ob-title" style="font-family:'Golos Text',sans-serif;font-weight:800;font-size:18px;color:#ECECEC;margin-bottom:8px;line-height:1.3;"></div>
  <div id="ob-text" style="font-size:13px;color:#919191;line-height:1.5;margin-bottom:18px;"></div>
  <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;">
    <button onclick="obSkip()" style="background:transparent;border:none;color:#5E5E5E;font-size:12px;cursor:pointer;font-family:inherit;padding:8px 0;">{% trans "Пропустить" %}</button>
    <div style="display:flex;gap:8px;">
      <button id="ob-prev" onclick="obPrev()" style="background:transparent;border:1px solid rgba(255,255,255,0.1);color:#919191;padding:8px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit;">←</button>
      <button id="ob-next" onclick="obNext()" style="background:#64B5F6;border:none;color:#1A1A1A;padding:8px 18px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;">{% trans "Далее" %} →</button>
    </div>
  </div>
</div>
<style>
  .ob-highlight{position:relative;z-index:9999!important;box-shadow:0 0 0 3px #64B5F6, 0 0 0 9999px rgba(0,0,0,0.7)!important;border-radius:12px!important;transition:all .2s;}
</style>
<script>
(function(){
  var STORAGE_KEY = 'cp_onboarding_done_v1';
  if (localStorage.getItem(STORAGE_KEY)) return;

  var role = '{{ request.user.userprofile.role|default:"buyer" }}';
  var stepsByRole = {
    seller: [
      {sel:'.seller-sidebar', title:"{% trans 'Добро пожаловать в кабинет поставщика!' %}", text:"{% trans 'Слева — навигация по разделам. Здесь вы управляете каталогом, заказами и SLA.' %}"},
      {sel:'[data-nav-key="dashboard"], [href$="/seller/"]', title:"{% trans 'Дашборд' %}", text:"{% trans 'Главная панель: ключевые метрики, входящие RFQ, активные заказы и SLA-дедлайны.' %}"},
      {sel:'[data-nav-key="products"], [href*="/seller/products"]', title:"{% trans 'Товары и прайсы' %}", text:"{% trans 'Загружайте каталог через Excel или вручную. Есть массовое редактирование.' %}"},
      {sel:'[data-nav-key="orders"], [href*="/seller/orders"]', title:"{% trans 'Заказы' %}", text:"{% trans 'Все заказы по вашим товарам. Фильтры по статусу, оплате, SLA.' %}"},
      {sel:'#notifBell', title:"{% trans 'Уведомления' %}", text:"{% trans 'Колокольчик показывает новые RFQ, заказы и оплаты в реальном времени.' %}"},
    ],
    buyer: [
      {sel:'.buyer-sidebar', title:"{% trans 'Добро пожаловать!' %}", text:"{% trans 'Это ваш кабинет покупателя. Слева — навигация: RFQ, заказы, поставщики, аналитика.' %}"},
      {sel:'[href*="/buyer/rfq"]', title:"RFQ", text:"{% trans 'Создавайте запросы котировок — поставщики ответят с ценами и сроками.' %}"},
      {sel:'[href*="/buyer/orders"]', title:"{% trans 'Мои заказы' %}", text:"{% trans 'История всех ваших заказов с трекингом доставки.' %}"},
      {sel:'[href*="/buyer/suppliers"]', title:"{% trans 'Поставщики' %}", text:"{% trans 'Каталог проверенных поставщиков с рейтингом и историей сделок.' %}"},
      {sel:'#notifBell', title:"{% trans 'Уведомления' %}", text:"{% trans 'Колокольчик уведомляет о статусе ваших заказов и ответах на RFQ.' %}"},
    ],
    operator: [
      {sel:'.op-sidebar', title:"{% trans 'Кабинет оператора' %}", text:"{% trans 'Управление логистикой, таможней, платежами и переговорами между поставщиками и покупателями.' %}"},
      {sel:'.op-role-switcher, [href="/operator/"]', title:"{% trans 'Роли оператора' %}", text:"{% trans 'Менеджер, Логист, Таможня, Платежи — переключайтесь между функциональными ролями.' %}"},
    ],
  };

  var steps = stepsByRole[role] || stepsByRole.buyer;
  var idx = 0;
  var lastEl = null;

  function position(el){
    var pop = document.getElementById('onboarding-popover');
    var r = el.getBoundingClientRect();
    var pw = 340, ph = pop.offsetHeight || 200;
    var top = r.bottom + 12;
    var left = r.left;
    if (top + ph > window.innerHeight) top = Math.max(20, r.top - ph - 12);
    if (left + pw > window.innerWidth - 20) left = window.innerWidth - pw - 20;
    if (left < 20) left = 20;
    pop.style.top = top + 'px';
    pop.style.left = left + 'px';
  }
  function show(){
    var step = steps[idx];
    if (!step) return finish();
    if (lastEl) lastEl.classList.remove('ob-highlight');
    var el = document.querySelector(step.sel);
    if (!el) { idx++; return show(); }
    lastEl = el;
    el.classList.add('ob-highlight');
    el.scrollIntoView({behavior:'smooth', block:'center'});
    document.getElementById('onboarding-overlay').style.display = 'block';
    var pop = document.getElementById('onboarding-popover');
    pop.style.display = 'block';
    document.getElementById('ob-step-num').textContent = (idx+1) + ' / ' + steps.length;
    document.getElementById('ob-title').textContent = step.title;
    document.getElementById('ob-text').textContent = step.text;
    document.getElementById('ob-prev').style.visibility = idx === 0 ? 'hidden' : 'visible';
    document.getElementById('ob-next').textContent = idx === steps.length - 1 ? '{% trans "Готово" %} ✓' : '{% trans "Далее" %} →';
    setTimeout(function(){ position(el); }, 100);
  }
  function finish(){
    if (lastEl) lastEl.classList.remove('ob-highlight');
    document.getElementById('onboarding-overlay').style.display = 'none';
    document.getElementById('onboarding-popover').style.display = 'none';
    localStorage.setItem(STORAGE_KEY, '1');
  }
  window.obNext = function(){ idx++; if (idx >= steps.length) return finish(); show(); };
  window.obPrev = function(){ if (idx > 0) idx--; show(); };
  window.obSkip = finish;

  // Show after 800ms (let page render)
  document.addEventListener('DOMContentLoaded', function(){ setTimeout(show, 800); });
  // Reset (debug): localStorage.removeItem('cp_onboarding_done_v1')
})();
</script>
