{# Skeleton placeholder while content loads. Use: include with rows=5, height=60 #}
<style>
  .skel{background:linear-gradient(90deg,#242424 25%,#2C2C2C 50%,#242424 75%);background-size:200% 100%;animation:skel-shimmer 1.4s ease-in-out infinite;border-radius:8px;}
  @keyframes skel-shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
  .skel-card{padding:14px 18px;background:#242424;border:1px solid rgba(255,255,255,0.04);border-radius:14px;margin-bottom:10px;}
  .skel-row{display:flex;align-items:center;gap:14px;padding:10px 0;}
  .skel-circle{width:36px;height:36px;border-radius:50%;flex-shrink:0;}
  .skel-line{height:12px;flex:1;}
  .skel-line.short{max-width:140px;}
  .skel-line.medium{max-width:240px;}
</style>
<div class="skel-card">
  {% for _ in "xxxxx"|make_list|slice:":5" %}
  <div class="skel-row">
    <div class="skel skel-circle"></div>
    <div style="flex:1;display:flex;flex-direction:column;gap:6px;">
      <div class="skel skel-line medium"></div>
      <div class="skel skel-line short"></div>
    </div>
    <div class="skel skel-line short" style="max-width:80px;"></div>
  </div>
  {% endfor %}
</div>
