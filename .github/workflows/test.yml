name: Test

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports: ["5432:5432"]
        options: --health-cmd="pg_isready -U test" --health-interval=5s --health-timeout=5s --health-retries=5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd="redis-cli ping" --health-interval=5s --health-timeout=5s --health-retries=5

    env:
      DEBUG_MODE: "True"
      SECRET_KEY: "test-key-for-ci-only-not-for-prod-aaaaaaaaaaaaaaaaaaaaaaaaaaaa"
      DATABASE_URL: "postgres://test:test@localhost:5432/test"
      ALLOWED_HOSTS: "localhost,127.0.0.1,testserver"
      CSRF_TRUSTED_ORIGINS: "http://localhost,http://127.0.0.1"
      CELERY_BROKER_URL: "redis://localhost:6379/0"
      CELERY_TASK_ALWAYS_EAGER: "True"
      CHANNELS_INMEMORY: "True"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install gettext (for compilemessages)
        run: sudo apt-get install -y gettext

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django pytest-cov factory-boy

      - name: Run Django checks
        run: |
          python manage.py check
          python manage.py makemigrations --check --dry-run

      - name: Compile translations
        run: python manage.py compilemessages

      - name: Apply migrations
        run: python manage.py migrate --noinput

      - name: Collect static
        run: python manage.py collectstatic --noinput

      - name: Run tests
        run: |
          if [ -f pytest.ini ] || [ -f pyproject.toml ] && grep -q '\[tool.pytest' pyproject.toml 2>/dev/null; then
            pytest --cov=marketplace --cov-report=term --cov-report=xml -q
          else
            python manage.py test --keepdb --parallel auto
          fi

      - name: Upload coverage
        if: always() && hashFiles('coverage.xml') != ''
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: |
          ruff check . --output-format=github || echo "::warning::Lint warnings (non-blocking)"
          ruff format --check . || echo "::warning::Format warnings (non-blocking)"

  deploy-check:
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      DEBUG_MODE: "False"
      USE_HTTPS: "True"
      SECRET_KEY: "deploy-check-key-aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
      ALLOWED_HOSTS: "consolidator.parts"
      CSRF_TRUSTED_ORIGINS: "https://consolidator.parts"
      SECURE_HSTS_SECONDS: "31536000"
      SESSION_COOKIE_SECURE: "True"
      CSRF_COOKIE_SECURE: "True"
      SECURE_SSL_REDIRECT: "True"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - run: |
          pip install -r requirements.txt
          python manage.py check --deploy --fail-level WARNING || echo "::warning::Deploy check has warnings"
