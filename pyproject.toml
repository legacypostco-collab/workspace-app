[tool.black]
line-length = 100
target-version = ["py313"]
extend-exclude = '''
(
  migrations
)
'''

[tool.ruff]
line-length = 100
target-version = "py313"
extend-exclude = ["migrations"]

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP"]
ignore = ["E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "consolidator_site.settings"
python_files = ["test_*.py", "*_test.py", "tests.py"]
testpaths = ["tests", "marketplace/tests"]
addopts = "-p no:cacheprovider --tb=short"
